<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    background: radial-gradient(circle at bottom, #00111a, #000);
}

/* ดาว */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:0.7;
}

/* ดาวตก */
.shooting-star{
    position:absolute;
    width:2px;
    height:80px;
    background:linear-gradient(white, transparent);
    transform:rotate(45deg);
    opacity:0.8;
    animation:shoot 3s linear infinite;
}

@keyframes shoot{
    0%{
        transform:translate(-200px, -200px) rotate(45deg);
        opacity:0;
    }
    10%{opacity:1;}
    100%{
        transform:translate(800px, 800px) rotate(45deg);
        opacity:0;
    }
}

/* กล่อง */
.container{
    text-align:center;
    z-index:10;
}

/* ปุ่ม */
.btn{
    display:block;
    margin:15px;
    padding:15px 40px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-size:18px;
    background:linear-gradient(45deg,#ff9800,#ff5722);
    box-shadow:0 0 20px #ff9800;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px #ff9800;
}
</style>
</head>

<body>

<div class="container">
    <h1 style="color:white;">Download</h1>

    <a class="btn" href="https://www.mediafire.com/file/no4ydloor0g947q/Codex+V2.711.876.apk/file?dkey=epfqx01s3sh&r=966" target="_blank">
        ดาวน์โหลด Codex V2
    </a>
</div>

<script>
// สร้างดาว
for(let i=0;i<120;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    document.body.appendChild(star);
}

// สร้างดาวตก
for(let i=0;i<3;i++){
    let s=document.createElement("div");
    s.className="shooting-star";
    s.style.top=Math.random()*50+"%";
    s.style.left=Math.random()*50+"%";
    s.style.animationDelay=Math.random()*3+"s";
    document.body.appendChild(s);
}
</script>

</body>
</html>
